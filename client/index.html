<!DOCTYPE html>
<html>
<head>
<title>Nightcord</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<style>/*! tailwindcss v4.2.2 | MIT License | https://tailwindcss.com */
@layer properties;
@layer theme, base, components, utilities;
@layer theme {
  :root, :host {
    --font-sans: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol',
    'Noto Color Emoji';
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New',
    monospace;
    --color-blue-200: oklch(88.2% 0.059 254.128);
    --color-blue-400: oklch(70.7% 0.165 254.624);
    --color-blue-500: oklch(62.3% 0.214 259.815);
    --color-slate-50: oklch(98.4% 0.003 247.858);
    --color-slate-100: oklch(96.8% 0.007 247.896);
    --color-slate-200: oklch(92.9% 0.013 255.508);
    --color-slate-300: oklch(86.9% 0.022 252.894);
    --color-slate-400: oklch(70.4% 0.04 256.788);
    --color-slate-500: oklch(55.4% 0.046 257.417);
    --color-slate-800: oklch(27.9% 0.041 260.031);
    --color-white: #fff;
    --spacing: 0.25rem;
    --text-xs: 0.75rem;
    --text-xs--line-height: calc(1 / 0.75);
    --text-sm: 0.875rem;
    --text-sm--line-height: calc(1.25 / 0.875);
    --text-lg: 1.125rem;
    --text-lg--line-height: calc(1.75 / 1.125);
    --text-xl: 1.25rem;
    --text-xl--line-height: calc(1.75 / 1.25);
    --font-weight-bold: 700;
    --default-font-family: var(--font-sans);
    --default-mono-font-family: var(--font-mono);
  }
}
@layer base {
  *, ::after, ::before, ::backdrop, ::file-selector-button {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border: 0 solid;
  }
  html, :host {
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    tab-size: 4;
    font-family: var(--default-font-family, ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji');
    font-feature-settings: var(--default-font-feature-settings, normal);
    font-variation-settings: var(--default-font-variation-settings, normal);
    -webkit-tap-highlight-color: transparent;
  }
  hr {
    height: 0;
    color: inherit;
    border-top-width: 1px;
  }
  abbr:where([title]) {
    -webkit-text-decoration: underline dotted;
    text-decoration: underline dotted;
  }
  h1, h2, h3, h4, h5, h6 {
    font-size: inherit;
    font-weight: inherit;
  }
  a {
    color: inherit;
    -webkit-text-decoration: inherit;
    text-decoration: inherit;
  }
  b, strong {
    font-weight: bolder;
  }
  code, kbd, samp, pre {
    font-family: var(--default-mono-font-family, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace);
    font-feature-settings: var(--default-mono-font-feature-settings, normal);
    font-variation-settings: var(--default-mono-font-variation-settings, normal);
    font-size: 1em;
  }
  small {
    font-size: 80%;
  }
  sub, sup {
    font-size: 75%;
    line-height: 0;
    position: relative;
    vertical-align: baseline;
  }
  sub {
    bottom: -0.25em;
  }
  sup {
    top: -0.5em;
  }
  table {
    text-indent: 0;
    border-color: inherit;
    border-collapse: collapse;
  }
  :-moz-focusring {
    outline: auto;
  }
  progress {
    vertical-align: baseline;
  }
  summary {
    display: list-item;
  }
  ol, ul, menu {
    list-style: none;
  }
  img, svg, video, canvas, audio, iframe, embed, object {
    display: block;
    vertical-align: middle;
  }
  img, video {
    max-width: 100%;
    height: auto;
  }
  button, input, select, optgroup, textarea, ::file-selector-button {
    font: inherit;
    font-feature-settings: inherit;
    font-variation-settings: inherit;
    letter-spacing: inherit;
    color: inherit;
    border-radius: 0;
    background-color: transparent;
    opacity: 1;
  }
  :where(select:is([multiple], [size])) optgroup {
    font-weight: bolder;
  }
  :where(select:is([multiple], [size])) optgroup option {
    padding-inline-start: 20px;
  }
  ::file-selector-button {
    margin-inline-end: 4px;
  }
  ::placeholder {
    opacity: 1;
  }
  @supports (not (-webkit-appearance: -apple-pay-button)) or (contain-intrinsic-size: 1px) {
    ::placeholder {
      color: currentcolor;
      @supports (color: color-mix(in lab, red, red)) {
        color: color-mix(in oklab, currentcolor 50%, transparent);
      }
    }
  }
  textarea {
    resize: vertical;
  }
  ::-webkit-search-decoration {
    -webkit-appearance: none;
  }
  ::-webkit-date-and-time-value {
    min-height: 1lh;
    text-align: inherit;
  }
  ::-webkit-datetime-edit {
    display: inline-flex;
  }
  ::-webkit-datetime-edit-fields-wrapper {
    padding: 0;
  }
  ::-webkit-datetime-edit, ::-webkit-datetime-edit-year-field, ::-webkit-datetime-edit-month-field, ::-webkit-datetime-edit-day-field, ::-webkit-datetime-edit-hour-field, ::-webkit-datetime-edit-minute-field, ::-webkit-datetime-edit-second-field, ::-webkit-datetime-edit-millisecond-field, ::-webkit-datetime-edit-meridiem-field {
    padding-block: 0;
  }
  ::-webkit-calendar-picker-indicator {
    line-height: 1;
  }
  :-moz-ui-invalid {
    box-shadow: none;
  }
  button, input:where([type='button'], [type='reset'], [type='submit']), ::file-selector-button {
    appearance: button;
  }
  ::-webkit-inner-spin-button, ::-webkit-outer-spin-button {
    height: auto;
  }
  [hidden]:where(:not([hidden='until-found'])) {
    display: none!important;
  }
}
@layer utilities;
* {
  --tw-duration: 100ms;
  transition-duration: 100ms;
}
#header {
  display: flex;
  height: 10vh;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  border-bottom-style: var(--tw-border-style);
  border-bottom-width: 2px;
  border-color: var(--color-slate-200);
  background-color: var(--color-slate-50);
  padding-inline: calc(var(--spacing) * 5);
}
#header h1 {
  border-radius: 0.25rem;
  padding: calc(var(--spacing) * 2);
  font-size: var(--text-xl);
  line-height: var(--tw-leading, var(--text-xl--line-height));
  --tw-font-weight: var(--font-weight-bold);
  font-weight: var(--font-weight-bold);
  color: var(--color-slate-500);
  &:hover {
    @media (hover: hover) {
      background-color: var(--color-white);
    }
  }
  &:hover {
    @media (hover: hover) {
      color: var(--color-slate-400);
    }
  }
}
button {
  align-items: center;
  border-radius: 0.25rem;
  border-style: var(--tw-border-style);
  border-width: 1px;
  border-color: var(--color-blue-500);
  background-color: var(--color-blue-400);
  padding-inline: calc(var(--spacing) * 3);
  --tw-font-weight: var(--font-weight-bold);
  font-weight: var(--font-weight-bold);
  color: var(--color-white);
  &:hover {
    @media (hover: hover) {
      background-color: var(--color-blue-200);
    }
  }
}
#jsonContainer {
  display: flex;
  max-height: 80vh;
  flex-direction: column-reverse;
  gap: calc(var(--spacing) * 1);
  overflow-y: scroll;
  scroll-behavior: smooth;
  background-color: var(--color-slate-50);
  padding-block: calc(var(--spacing) * 3);
}
.message {
  margin-inline: calc(var(--spacing) * 5);
  display: flex;
  flex-direction: column;
  border-radius: 0.25rem;
  padding: calc(var(--spacing) * 5);
  &:hover {
    @media (hover: hover) {
      background-color: var(--color-white);
    }
  }
}
.message h1 {
  margin: calc(var(--spacing) * 0);
  font-size: var(--text-xl);
  line-height: var(--tw-leading, var(--text-xl--line-height));
  --tw-font-weight: var(--font-weight-bold);
  font-weight: var(--font-weight-bold);
  color: var(--color-slate-500);
}
.messageContent {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  gap: calc(var(--spacing) * 1);
}
.message p {
  font-size: var(--text-lg);
  line-height: var(--tw-leading, var(--text-lg--line-height));
  color: var(--color-slate-800);
}
.message.active {
  background-color: var(--color-white)!important;
}
.editDisclaimer {
  align-items: baseline;
  font-size: var(--text-sm)!important;
  line-height: var(--tw-leading, var(--text-sm--line-height))!important;
  color: var(--color-slate-400)!important;
}
.message span {
  font-size: var(--text-sm);
  line-height: var(--tw-leading, var(--text-sm--line-height));
  color: var(--color-slate-400);
}
form {
  margin-inline: auto;
  display: flex;
  height: 10vh;
  flex-direction: row;
  gap: calc(var(--spacing) * 1);
  border-top-style: var(--tw-border-style);
  border-top-width: 2px;
  border-color: var(--color-slate-100);
  background-color: var(--color-slate-50);
  padding: calc(var(--spacing) * 5);
}
input {
  min-width: calc(var(--spacing) * 0);
  border-radius: 0.25rem;
  border-style: var(--tw-border-style);
  border-width: 1px;
  border-color: var(--color-slate-300);
  padding: calc(var(--spacing) * 3);
  color: var(--color-slate-800);
}
#nameInput {
  flex: 2!important;
}
#messageInput {
  flex: 10;
}
form button {
  min-width: calc(var(--spacing) * 0);
  flex: 1!important;
}
.messageHeader {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
}
.buttonContainer button {
  border-color: var(--color-slate-400);
  background-color: var(--color-slate-300);
  color: var(--color-slate-50);
  &:hover {
    @media (hover: hover) {
      background-color: var(--color-slate-200);
    }
  }
}
#editing {
  position: absolute;
  margin-inline: calc(var(--spacing) * 5);
  margin-block: calc(var(--spacing) * 1);
  font-size: var(--text-xs);
  line-height: var(--tw-leading, var(--text-xs--line-height));
  color: var(--color-slate-400);
}
@property --tw-duration {
  syntax: "*";
  inherits: false;
}
@property --tw-border-style {
  syntax: "*";
  inherits: false;
  initial-value: solid;
}
@property --tw-font-weight {
  syntax: "*";
  inherits: false;
}
@layer properties {
  @supports ((-webkit-hyphens: none) and (not (margin-trim: inline))) or ((-moz-orient: inline) and (not (color:rgb(from red r g b)))) {
    *, ::before, ::after, ::backdrop {
      --tw-duration: initial;
      --tw-border-style: solid;
      --tw-font-weight: initial;
    }
  }
}
</style>
</head>

<body>
<div id="header">
  <h1>Nightcord</h1>
  <button onClick = getData()>Click Here To Fetch Data</button>
</div>
<div id="jsonContainer"></div>

<div>
  <h2 id="editing" style="display: none;">Editing Message.</h2>
  <form>
    <input type="text" id="nameInput" placeholder="Username"></input>
    <input type="text" id="messageInput" placeholder="Enter your message"></input>
    <button type="button" onclick="
    sendData()">Send</button> 
    </form>
    </div>
<script>
  messageInput = document.getElementById("messageInput");
  editing = false;
  editing_id = "";
  link = "https://sturdy-system-7vv7qq955gqrfpvwr-8500.app.github.dev"

  lukasMode = true;

  if (lukasMode) {
      document.getElementById("messageInput").placeholder = "Lukas Mode is on. No changes will be sent, edited, or deleted."
    }

  function toggleEditing(bool) { // Toggles The Editing State
    editing = bool;
    let editingNote = document.getElementById("editing");

    activeElement = document.getElementById(editing_id);
    if (editing) {
      editingNote.style.display = "block";
      activeElement.classList.add("active");
    } else {
      editingNote.style.display = "none";
      activeElement.classList.remove("active");
    }
  }
   
  messageInput.addEventListener("keydown", function(event) { // Checks if user presses enter in the type box
        // If the user presses the "Enter" key on the keyboard
        if (event.key === "Enter" && !event.shiftKey) { // allow for shift enter
            // Cancel the default action, if needed, especially for textareas
            event.preventDefault(); 
            // Trigger the form submission or button click
            sendData();

        }

        if (event.key === "Escape" && editing) { // if escape is pressed while editing, cancel the edit
          toggleEditing(false);
          messageInput.value = "";
        }
    });

  async function getData() { // Function to get messages 
    jsonData = [];
    htmlCode = ""
    lastHTML = document.getElementById("jsonContainer").innerHTML;
    jsonContainer = document.getElementById("jsonContainer");
    try {
      fetch(link + "/")
      .then(response => response.json())
      .then(data => {
        data.forEach(element => {
          htmlCode = `
          <div class="message" id="${element.Id}">
            <div class="messageHeader">
              <h1>${element.Name}</h1>
              <div class="buttonContainer">
              <button onclick="populateData('${element.Id}')">edit</button>
              <button onclick="deleteData('${element.Id}')">delete</button>
              </div>
            </div>
            <div class="messageContent">
            <p>${element.Message}</p>
            `
            + (element.Edited == 1 ? "<p class='editDisclaimer'>(edited)</p>" : "") +
            `
            </div>
            <span>${new Date(element.Timestamp).toLocaleString()}</span>
            </div>` +htmlCode;
          jsonData.push(element);
        });
      }).finally(() => {
        console.log("Fetch Completed.");
        


    if (lastHTML != htmlCode) { // Only update the HTML if it has changed
      console.log("Html is DIFFERENT. changing.");
      jsonContainer.innerHTML = htmlCode;

      console.log(typeof jsonContainer.innerHTML, typeof htmlCode);
    }
      });
    } catch {
      response = "Server Returned 500."
      console.log("Server Error.")
      return
    }

  }

  async function sendData() { // Function to send and edit messages
    if (lukasMode) {
      return;
    }
    name = document.getElementById("nameInput").value;
    message = document.getElementById("messageInput").value;
    messageInput.value = "";

    if (editing) { // PUT REQUEST
      data = {
        "Name": name,
        "Message": message,
        "Timestamp": new Date(document.getElementById(editing_id).querySelector("span").innerText).toISOString(),
        "Id": editing_id,
      }

      toggleEditing(false);

      try {
        const response = await fetch(link + "/put", {
          method: "PUT", // *MUST* be 'PUT' for a PUT request
          headers: {
            "Content-Type": "application/json", // Indicates the body format is JSON
          },
          body: JSON.stringify(data), // Converts the JavaScript object to a JSON string
        });
      } catch (error) {
        console.error("Error:", error); // Handles network errors or the error thrown above
      }

      getData();
      return;
    }

    // POST REQUEST 
    data = {
      "Name": name,
      "Message": message,
      "Timestamp": new Date().toISOString()
    }
    console.log("button pressed.");
     try {
    const response = await fetch(link + "/post", {
      method: "POST", // *MUST* be 'POST' for a POST request
      headers: {
        "Content-Type": "application/json", // Indicates the body format is JSON
      },
      body: JSON.stringify(data), // Converts the JavaScript object to a JSON string
    });
  }  catch (error) {
    console.error("Error: ", error); // Handles network errors or the error thrown above
  }

    getData();
    return;
  }

  async function deleteData(id) { // Function to delete messages
    if (lukasMode) {
      return;
    }
    data = {
      "Id": id,
    } 
    // yes we have to put the singular value in a json file
    try {
      const response = await fetch(link + "/delete", {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json", // Indicates the body format is JSON
        },
        body: JSON.stringify(data), // Converts the JavaScript object to a JSON string
      });
    }  catch (error) {
      console.error("Error: ", error); // Handles network errors or the error thrown above
    }
  
    getData();

    }
  
  function populateData(id) { // Function to populate the input fields with the message data for editing
    if (lukasMode) {
      return;
    }
    message = document.getElementById(id);
    message_name = message.querySelector("h1").innerText;
    message_text= message.querySelector("p").innerText;

    document.getElementById("nameInput").value = message_name;
    document.getElementById("messageInput").value = message_text;
    editing_id = id;
    toggleEditing(true); // its not a toggle if you specifiy the boolean!
  }
  
  getData(); // Initial Fetch Of Messages
  setInterval(getData, 1000); // Auto Fetch New Messages Every Second

  /*if anyone wants to copy the message, this get data function removes their selection every second and is annoying.*/
  </script>
</body>
</html>
